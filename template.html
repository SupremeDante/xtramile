<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XtraMile Music Reviews</title>
<meta name="description" content="XtraMile Music Reviews — live song review sessions.">
<meta property="og:title" content="XtraMile Music Reviews">
<meta property="og:description" content="Live song review sessions. Submit your track.">
<!-- No meta-refresh in <head> on purpose: GitHub Pages serves this file with
     cache-control max-age=600, so a baked-in target goes stale the moment the tunnel
     rotates or a new session starts. The script below reads target.json fresh on every
     load instead; the baked value survives only as a no-JS / fetch-failure fallback. -->
<noscript><meta http-equiv="refresh" content="0; url=__TARGET__"></noscript>
<style>
  :root { color-scheme: dark; }
  html,body { height:100%; margin:0; }
  body {
    background:#0b0b0d; color:#f2f2f5;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display:flex; align-items:center; justify-content:center; text-align:center;
    padding:2rem;
  }
  .wrap { max-width:32rem; }
  h1 { font-size:1.5rem; letter-spacing:.08em; text-transform:uppercase; margin:0 0 .75rem; }
  p { color:#a1a1aa; margin:0 0 1.5rem; font-size:.95rem; }
  a.btn {
    display:inline-block; padding:.85rem 1.6rem; border-radius:999px;
    background:#f2f2f5; color:#0b0b0d; text-decoration:none; font-weight:600;
  }
  .dot { display:inline-block; width:.5rem; height:.5rem; border-radius:50%;
         background:#ef4444; margin-right:.5rem; vertical-align:middle;
         animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% {opacity:1;} 50% {opacity:.25;} }
</style>
</head>
<body>
  <div class="wrap">
    <h1><span class="dot"></span>XtraMile Music Reviews</h1>
    <p>Taking you to the live session&hellip;</p>
    <a class="btn" id="go" href="__TARGET__">Enter session</a>
  </div>
<script>
(function () {
  var fallback = "__TARGET__";
  function go(u) { document.getElementById('go').href = u; location.replace(u); }
  // Cache-buster + no-store: a cached copy of this page must still resolve the CURRENT session.
  fetch('target.json?cb=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (d) { go(d && d.url ? d.url : fallback); })
    .catch(function () { go(fallback); });
})();
</script>
</body>
</html>
